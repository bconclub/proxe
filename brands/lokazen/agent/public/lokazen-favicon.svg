<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbOrange" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FF7A40"/>
      <stop offset="100%" stop-color="#FF5200"/>
    </radialGradient>
    <radialGradient id="orbRed" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FF3366"/>
      <stop offset="100%" stop-color="#E4002B"/>
    </radialGradient>
    <filter id="g" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Light rounded background -->
  <rect width="64" height="64" rx="14" fill="#FFFFFF"/>

  <!-- Outer ring -->
  <circle cx="32" cy="34" r="24" fill="none" stroke="#FF5200" stroke-width="1" opacity="0.2"/>

  <!-- Connection lines -->
  <line x1="24" y1="29" x2="34" y2="42" stroke="#FF5200" stroke-width="1" opacity="0.45"/>
  <line x1="38" y1="20" x2="34" y2="42" stroke="#FF5200" stroke-width="1" opacity="0.45"/>

  <!-- Large top-right orange orb -->
  <circle cx="38" cy="20" r="11" fill="url(#orbOrange)" filter="url(#g)"/>
  <circle cx="35" cy="17" r="4.5" fill="#FFFFFF" opacity="0.2"/>

  <!-- Medium left orange orb -->
  <circle cx="23" cy="29" r="8" fill="url(#orbOrange)" filter="url(#g)"/>
  <circle cx="20" cy="26" r="3" fill="#FFFFFF" opacity="0.2"/>

  <!-- Small bottom red orb -->
  <circle cx="39" cy="45" r="6" fill="url(#orbRed)" filter="url(#g)"/>
  <circle cx="36" cy="42" r="2.5" fill="#FFFFFF" opacity="0.22"/>
</svg>
