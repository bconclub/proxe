<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgG" cx="50%" cy="42%" r="55%">
      <stop offset="0%"  stop-color="#4a1200"/>
      <stop offset="60%" stop-color="#1a0600"/>
      <stop offset="100%" stop-color="#090300"/>
    </radialGradient>
    <radialGradient id="oLg" cx="38%" cy="32%" r="68%">
      <stop offset="0%"  stop-color="#FFC59B"/>
      <stop offset="22%" stop-color="#FF8E47"/>
      <stop offset="60%" stop-color="#F0641F"/>
      <stop offset="100%" stop-color="#A93B0D"/>
    </radialGradient>
    <radialGradient id="oMd" cx="38%" cy="32%" r="68%">
      <stop offset="0%"  stop-color="#FFC59B"/>
      <stop offset="22%" stop-color="#FF8E47"/>
      <stop offset="60%" stop-color="#F0641F"/>
      <stop offset="100%" stop-color="#A93B0D"/>
    </radialGradient>
    <radialGradient id="oRd" cx="38%" cy="32%" r="68%">
      <stop offset="0%"  stop-color="#FFB0BE"/>
      <stop offset="22%" stop-color="#FF5A77"/>
      <stop offset="60%" stop-color="#E11D48"/>
      <stop offset="100%" stop-color="#8B0E2C"/>
    </radialGradient>
    <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <clipPath id="cc">
      <circle cx="32" cy="32" r="32"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cc)">
    <rect width="64" height="64" fill="url(#bgG)"/>

    <!-- Ring -->
    <circle cx="32" cy="32" r="26" fill="none" stroke="#FF6B2B" stroke-width="0.5" opacity="0.9"/>

    <!-- Lines -->
    <g stroke="#FF5200" stroke-width="0.5" opacity="0.7" stroke-linecap="round">
      <line x1="30" y1="24" x2="22" y2="36.5"/>
      <line x1="30" y1="24" x2="42" y2="42.5"/>
      <line x1="22" y1="36.5" x2="42" y2="42.5"/>
    </g>

    <!-- Large orange node -->
    <circle cx="30" cy="24" r="9" fill="url(#oLg)" filter="url(#gl)" opacity="0.5"/>
    <circle cx="30" cy="24" r="8.5" fill="url(#oLg)"/>
    <circle cx="27.5" cy="21.5" r="2" fill="#FFFFFF" opacity="0.6"/>

    <!-- Medium orange node -->
    <circle cx="22" cy="36.5" r="6.5" fill="url(#oMd)" filter="url(#gl)" opacity="0.5"/>
    <circle cx="22" cy="36.5" r="6" fill="url(#oMd)"/>
    <circle cx="20" cy="34.5" r="1.5" fill="#FFFFFF" opacity="0.6"/>

    <!-- Small red node -->
    <circle cx="42" cy="42.5" r="5" fill="url(#oRd)" filter="url(#gl)" opacity="0.5"/>
    <circle cx="42" cy="42.5" r="4.5" fill="url(#oRd)"/>
    <circle cx="40.5" cy="41" r="1.1" fill="#FFFFFF" opacity="0.65"/>
  </g>
</svg>
