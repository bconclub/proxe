name: Deploy Windchasers Agent

on:
  push:
    branches:
      - main
    paths:
      - 'brands/windchasers/agent/**'
      - '.github/workflows/deploy-windchasers.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: brands/windchasers/agent/package-lock.json

      - name: Increment build version
        working-directory: brands/windchasers/agent
        run: |
          node scripts/increment-build.js

      - name: Commit version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add brands/windchasers/agent/package.json brands/windchasers/agent/.build-info
          git commit -m "chore: auto-increment build version [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WINDCHASERS_VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.WINDCHASERS_VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS via Rsync
        run: |
          rsync -avz --delete \
            --exclude='.env.local' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='voice/' \
            --exclude='worker/' \
            -e "ssh -o StrictHostKeyChecking=no" \
            brands/windchasers/agent/ \
            ${{ secrets.WINDCHASERS_VPS_USER }}@${{ secrets.WINDCHASERS_VPS_HOST }}:/var/www/windchasers-proxe/

      - name: Build and Restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WINDCHASERS_VPS_HOST }}
          username: ${{ secrets.WINDCHASERS_VPS_USER }}
          key: ${{ secrets.WINDCHASERS_VPS_SSH_KEY }}
          port: 22
          timeout: 1200s
          command_timeout: 20m
          script: |
            cd /var/www/windchasers-proxe

            # Verify .env.local exists
            if [ ! -f .env.local ]; then
              echo "❌ ERROR: .env.local not found on VPS!"
              echo "Run the VPS setup script first: brands/windchasers/scripts/setup-vps.sh"
              exit 1
            fi

            # Check required env vars
            echo "🔍 Verifying environment variables..."
            MISSING=""
            grep -q "NEXT_PUBLIC_WINDCHASERS_SUPABASE_URL"    .env.local || MISSING="$MISSING NEXT_PUBLIC_WINDCHASERS_SUPABASE_URL"
            grep -q "NEXT_PUBLIC_WINDCHASERS_SUPABASE_ANON_KEY" .env.local || MISSING="$MISSING NEXT_PUBLIC_WINDCHASERS_SUPABASE_ANON_KEY"
            grep -q "SUPABASE_SERVICE_ROLE_KEY"               .env.local || MISSING="$MISSING SUPABASE_SERVICE_ROLE_KEY"
            grep -q "CLAUDE_API_KEY"                          .env.local || MISSING="$MISSING CLAUDE_API_KEY"
            grep -q "META_WHATSAPP_ACCESS_TOKEN"              .env.local || MISSING="$MISSING META_WHATSAPP_ACCESS_TOKEN"

            if [ -n "$MISSING" ]; then
              echo "❌ ERROR: Missing env vars:$MISSING"
              exit 1
            fi
            echo "✅ Environment variables OK"

            # Clean build
            echo "🧹 Cleaning previous build..."
            rm -rf node_modules .next

            # Install
            echo "📦 Installing dependencies..."
            npm ci --prefer-offline --no-audit --no-fund --loglevel=warn

            # Build
            echo "🏗️  Building..."
            export NODE_OPTIONS="--max-old-space-size=4096"
            export NODE_ENV=production
            export NEXT_TELEMETRY_DISABLED=1
            npm run build 2>&1 | tee build.log || {
              echo "❌ Build failed! Last 50 lines:"
              tail -50 build.log
              exit 1
            }

            # Sanity check
            [ -f ".next/BUILD_ID" ] || { echo "❌ BUILD_ID missing"; exit 1; }
            echo "✅ Build ID: $(cat .next/BUILD_ID)"

            # Create logs dir
            mkdir -p logs

            # Restart PM2
            echo "🔄 Restarting PM2..."
            pm2 stop windchasers-dashboard 2>/dev/null || true
            pm2 delete windchasers-dashboard 2>/dev/null || true
            sleep 2
            pm2 start ecosystem.config.js --only windchasers-dashboard || \
              PORT=3003 pm2 start npm --name windchasers-dashboard -- start
            pm2 save

            # Health check
            echo "⏳ Waiting for app to start..."
            sleep 10
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3003/api/health > /dev/null; then
                echo "✅ Health check passed"
                curl -s http://localhost:3003/api/health
                break
              fi
              echo "⏳ Attempt $i/5..."
              sleep 5
            done

            echo ""
            echo "✅ Deployment complete — https://proxe.windchasers.in"
            pm2 list | grep windchasers
