name: Deploy Template Sync Worker

on:
  push:
    branches: [ main, production ]
    paths:
      - 'brands/bcon/workers/template-sync/**'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.BCON_VPS_HOST }}
          username: ${{ secrets.BCON_VPS_USER }}
          key: ${{ secrets.BCON_VPS_SSH_KEY }}
          source: "brands/bcon/workers/template-sync/*"
          target: "/var/www/bcon-proxe/brands/bcon/workers/template-sync"
          strip_components: 4
          
      - name: Restart Worker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BCON_VPS_HOST }}
          username: ${{ secrets.BCON_VPS_USER }}
          key: ${{ secrets.BCON_VPS_SSH_KEY }}
          script: |
            cd /var/www/bcon-proxe/brands/bcon/workers/template-sync
            npm install
            pm2 delete template-sync 2>/dev/null || true
            pm2 start index.ts --name template-sync --cron "0 */6 * * *"
            pm2 save
